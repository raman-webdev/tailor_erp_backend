<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Email</title>
</head>
<body>

<h2>Welcome to Tailor ERP</h2>

<p>{{ verification_link }}</p>

<p>This link expires in 24 hours.</p>

</body>
</html>
